<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 506" width="900" height="506" role="img" aria-label="Placeholder: animated streaming reading demo">
  <rect width="900" height="506" fill="#1C1C1C"/>
  <text x="50%" y="22%" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#C4A0A0">PLACEHOLDER — animated demo</text>
  <clipPath id="window"><rect x="120" y="210" width="660" height="90"/></clipPath>
  <g clip-path="url(#window)">
    <text font-family="Cormorant Garamond, Georgia, serif" font-size="48" fill="#FFFFFF" y="270">
      <tspan x="780">one line at a time, moving at your own pace, nothing in the way&#160;&#160;&#160;</tspan>
      <animate attributeName="x" from="780" to="-1200" dur="8s" repeatCount="indefinite"/>
    </text>
  </g>
  <rect x="120" y="205" width="660" height="100" fill="none" stroke="#2F6FED" stroke-width="3"/>
  <text x="50%" y="86%" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#6B6B6B">Stream Reader — streaming demo</text>
</svg>
